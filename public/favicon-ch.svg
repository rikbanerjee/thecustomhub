<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- The CustomHub icon — CH monogram: C = Custom (marigold), H = Hub (rani) -->
  <rect width="512" height="512" rx="96" fill="#1A1423"/>
  <!-- C : arc open to the right -->
  <path d="M 226 172 A 104 104 0 1 0 226 340"
        fill="none" stroke="#FFB627" stroke-width="60" stroke-linecap="round"/>
  <!-- H -->
  <g fill="#D81E5B">
    <rect x="298" y="126" width="56" height="260" rx="10"/>
    <rect x="404" y="126" width="56" height="260" rx="10"/>
    <rect x="298" y="228" width="162" height="56" rx="10"/>
  </g>
  <!-- spark -->
  <path d="M96 96 l9 28 28 9 -28 9 -9 28 -9 -28 -28 -9 28 -9 Z" fill="#D81E5B"/>
  <!-- underline swipe -->
  <rect x="150" y="430" width="212" height="26" rx="13" fill="#FFF6E9" opacity="0.9" transform="rotate(-2 256 443)"/>
</svg>
