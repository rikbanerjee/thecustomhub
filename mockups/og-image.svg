<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="2.2" fill="#1A1423" opacity="0.08"/>
    </pattern>
    <g id="ray"><path d="M0,0 L48,-500 L-48,-500 Z" fill="#FFB627" opacity="0.35"/></g>
  </defs>
  <rect width="1200" height="630" fill="#FFF6E9"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- sunburst right -->
  <g transform="translate(1060,315)">
    <use href="#ray"/><use href="#ray" transform="rotate(30)"/><use href="#ray" transform="rotate(60)"/>
    <use href="#ray" transform="rotate(90)"/><use href="#ray" transform="rotate(120)"/><use href="#ray" transform="rotate(150)"/>
    <use href="#ray" transform="rotate(180)"/><use href="#ray" transform="rotate(210)"/><use href="#ray" transform="rotate(240)"/>
    <use href="#ray" transform="rotate(270)"/><use href="#ray" transform="rotate(300)"/><use href="#ray" transform="rotate(330)"/>
  </g>

  <!-- logo -->
  <text x="90" y="120" font-family="Anton, sans-serif" font-size="52" fill="#1A1423" letter-spacing="1">THE CUSTOM<tspan fill="#D81E5B">HUB</tspan></text>

  <!-- headline -->
  <g font-family="Anton, sans-serif" letter-spacing="2">
    <text x="90" y="255" font-size="96" fill="#1A1423">WEAR YOUR</text>
    <rect x="82" y="285" width="358" height="118" fill="#D81E5B" transform="rotate(-1.2 292 344)"/>
    <text x="104" y="380" font-size="96" fill="#FFF6E9" transform="rotate(-1.2 292 344)">FILMY</text>
    <rect x="88" y="420" width="346" height="12" fill="#FFB627" transform="rotate(-1.2 292 344)"/>
    <text x="470" y="380" font-size="96" fill="#1A1423">SIDE.</text>
  </g>

  <!-- tagline -->
  <text x="92" y="480" font-family="'Work Sans', sans-serif" font-weight="600" font-size="27" fill="#3D3548">Dual-lingo tees, hoodies &amp; mugs for the desi diaspora</text>

  <!-- stickers -->
  <g transform="translate(850,120) rotate(4)">
    <rect x="-10" y="-10" width="236" height="58" rx="29" fill="#D81E5B" stroke="#1A1423" stroke-width="5"/>
    <text x="108" y="29" text-anchor="middle" font-family="'Work Sans', sans-serif" font-weight="700" font-size="24" fill="#FFF6E9">PAISA VASOOL</text>
  </g>
  <g transform="translate(880,480) rotate(-4)">
    <rect x="-10" y="-10" width="216" height="58" rx="29" fill="#FFB627" stroke="#1A1423" stroke-width="5"/>
    <text x="98" y="29" text-anchor="middle" font-family="'Work Sans', sans-serif" font-weight="700" font-size="24" fill="#1A1423">100% FILMY</text>
  </g>

  <!-- bottom url strip -->
  <rect x="0" y="562" width="1200" height="68" fill="#1A1423"/>
  <text x="600" y="607" text-anchor="middle" font-family="Anton, sans-serif" font-size="30" letter-spacing="6" fill="#FFB627">THECUSTOMHUB.COM</text>
</svg>
